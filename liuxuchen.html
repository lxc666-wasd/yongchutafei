<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我 | 极简个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e0e0e0;
            --secondary: #888;
            --bg: #121212;
            --card: #1a1a1a;
            --border: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--primary);
            line-height: 1.6;
            padding: 0 20px;
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* 导航 */
        nav {
            padding: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 50px;
        }

        .logo {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: var(--secondary);
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* 标题区域 */
        header {
            margin: 70px 0;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--secondary);
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 区块通用样式 */
        section {
            margin: 60px 0;
        }

        h2 {
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: inline-block;
        }

        /* 关于我 */
        .about {
            font-size: 15px;
            color: var(--secondary);
        }

        /* 技能标签 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .tag {
            padding: 6px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 13px;
            color: var(--secondary);
        }

        /* 作品卡片 */
        .works {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            font-weight: 400;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 13px;
            color: var(--secondary);
        }

        /* 联系 */
        .contact a {
            color: var(--secondary);
            text-decoration: none;
            display: block;
            margin: 8px 0;
            font-size: 15px;
        }

        .contact a:hover {
            color: var(--primary);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            h1 {
                font-size: 32px;
            }

            nav {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .nav-links a {
                margin: 0 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <div class="logo">我的主页</div>
        <div class="nav-links">
            <a href="#about">关于</a>
            <a href="#skills">技能</a>
            <a href="#works">作品</a>
            <a href="#contact">联系</a>
        </div>
    </nav>

    <!-- 头部标题 -->
    <header>
        <h1>你好，我是 [你的名字]</h1>
        <p class="subtitle">专注简洁、高效、有质感的设计与创作</p>
    </header>

    <!-- 关于我 -->
    <section id="about">
        <h2>关于我</h2>
        <div class="about">
            热爱极简设计，追求清晰的逻辑与舒适的体验。
            专注前端、设计、创作，用最简单的形式表达最核心的内容。
        </div>
    </section>

    <!-- 技能 -->
    <section id="skills">
        <h2>技能</h2>
        <div class="skills">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">JavaScript</span>
            <span class="tag">UI 设计</span>
            <span class="tag">写作</span>
            <span class="tag">极简主义</span>
        </div>
    </section>

    <!-- 作品 -->
    <section id="works">
        <h2>作品</h2>
        <div class="works">
            <div class="card">
                <h3>极简个人网站</h3>
                <p>干净高级的单页网站，响应式适配全设备。</p>
            </div>
            <div class="card">
                <h3>作品集设计</h3>
                <p>以视觉为主的极简设计风格，突出内容本身。</p>
            </div>
            <div class="card">
                <h3>工具类项目</h3>
                <p>实用、轻量、无冗余功能的小工具。</p>
            </div>
        </div>
    </section>

    <!-- 联系 -->
    <section id="contact">
        <h2>联系</h2>
        <div class="contact">
            <a href="mailto:your@email.com">your@email.com</a>
            <a href="#">GitHub</a>
            <a href="#">小红书 / 知乎 / 推特</a>
        </div>
    </section>

    <script>
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
